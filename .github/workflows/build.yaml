name: Build Xiaomi sm8250 KSU & Droidspaces Kernel

on:
  workflow_dispatch: # 支持手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 优化服务器磁盘空间
      uses: jlumbroso/free-disk-space@v1.3.1

    - name: 安装基础编译依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libelf-dev ccache flex bison libssl-dev libcrypto++-dev

    - name: 下载 AOSP Clang 编译器
      run: |
        mkdir -p $GITHUB_WORKSPACE/clang
        cd $GITHUB_WORKSPACE/clang
        # 下载官方推荐的 Clang 17 编译器
        wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r498229b.tar.gz
        tar -xf clang-r498229b.tar.gz

    - name: 克隆小米 865 稳定内核源码
      run: |
        cd $GITHUB_WORKSPACE
        # 这里以 LineageOS 的 sm8250 树为例（代码极为规范）
        git clone https://github.com/LineageOS/android_kernel_xiaomi_sm8250.git -b lineage-21 --depth=1 kernel-source

    - name: 硬核注入 KernelSU 与 Droidspaces 容器配置
      run: |
        cd $GITHUB_WORKSPACE/kernel-source
        
        # 1. 注入适配 4.19 的 KernelSU v0.9.5 源码
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5
        
        # 2. 找到你的 defconfig 配置文件（LineageOS 的 sm8250 统一使用 vendor/sm8250_defconfig）
        DEFCONFIG="arch/arm64/configs/vendor/sm8250_defconfig"
        
        # 3. 强行追加 Droidspaces 缺失的 PID 和 IPC 隔离，以及 KSU 依赖的 Kprobes
        echo "CONFIG_PID_NS=y" >> $DEFCONFIG
        echo "CONFIG_IPC_NS=y" >> $DEFCONFIG
        echo "CONFIG_USER_NS=y" >> $DEFCONFIG
        echo "CONFIG_KPROBES=y" >> $DEFCONFIG
        echo "CONFIG_HAVE_KPROBES=y" >> $DEFCONFIG
        echo "CONFIG_KPROBE_EVENTS=y" >> $DEFCONFIG
        echo "CONFIG_KSU=y" >> $DEFCONFIG

    - name: 开始云编译
      run: |
        cd $GITHUB_WORKSPACE/kernel-source
        export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
        
        # 设置编译环境变量
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
        
        # 1. 生成配置文件
        make O=out vendor/sm8250_defconfig
        
        # 2. 全速编译内核（Ubuntu 虚拟机会开满多核）
        make -j$(nproc --all) O=out CC=clang

    - name: 打包为 AnyKernel3 卡刷包
      run: |
        cd $GITHUB_WORKSPACE
        # 克隆通用的 AnyKernel3 打包模板
        git clone https://github.com/osm0sis/AnyKernel3.git --depth=1 AnyKernel3
        
        # 把编译出的内核镜像（Image.gz）复制到打包目录
        cp kernel-source/out/arch/arm64/boot/Image.gz AnyKernel3/
        
        # 简单配置 AnyKernel3 信息
        cd AnyKernel3
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
        
        # 压缩成 zip 包
        zip -r ../KSU_Droidspaces_Kernel_umi.zip *

    - name: 上传成品
      uses: actions/upload-artifact@v4
      with:
        name: Xiaomi-10Pro-Kernel
        path: KSU_Droidspaces_Kernel_umi.zip